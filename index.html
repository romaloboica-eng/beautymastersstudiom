<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beauty Masters Studio - Панель мастера</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container" id="logoContainer">
        <div class="logo-svg" id="logoSvg">
          <img src="images/logo.png" alt="Beauty Masters Studio" onerror="this.style.display='none'">
        </div>
        <div class="logo-text" id="logoText" style="display: none;">
          <div>Beauty Masters Studio</div>
          <p>Панель мастера</p>
        </div>
      </div>
      <a href="client.html" class="switch-btn">← На сайт клиентов</a>
    </header>
    
    <div style="background:white; padding:20px; border-radius:12px; margin-bottom:24px; border:1px solid #e0e0e0;">
      <label>Выберите профиль мастера</label>
      <select id="masterSelect"></select>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" data-tab="new">Новые</button>
      <button class="tab-btn" data-tab="waiting">Ожидают времени</button>
      <button class="tab-btn" data-tab="confirmed">Подтверждённые</button>
      <button class="tab-btn" data-tab="completed">Завершённые</button>
    </div>
    
    <div id="requestsContainer">
      <div style="background:white; border-radius:12px; padding:40px; text-align:center; color:#888;">Загрузка заявок...</div>
    </div>
  </div>
  
  <div id="timePickerModal" class="modal">
    <div class="modal-content">
      <h2>Предложите время клиенту</h2>
      <input type="text" id="datetimePicker" placeholder="Выберите дату и время">
      <button id="addTimeBtn">Добавить ещё время</button>
      <div id="selectedTimesList" style="margin-top: 15px;"></div>
      <button id="sendTimesBtn">Отправить клиенту</button>
      <button onclick="closeTimePickerModal()" style="background:#999;">Отмена</button>
    </div>
  </div>
  
  <div id="clientRatingModal" class="modal">
    <div class="modal-content">
      <h2>Завершить запись</h2>
      <p>Оцените клиента:</p>
      <div style="display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap;">
        <button onclick="rateClient(5)">Отличный клиент</button>
        <button onclick="rateClient(4)">Хороший клиент</button>
        <button onclick="rateClient(3)">Нормально</button>
      </div>
      <button onclick="closeClientRatingModal()" style="background:#999;">Пропустить</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    // Данные мастеров
    const MASTERS = [
      { id: "master1", name: "Наталья", spec: "Ресницы / Брови" },
      { id: "master2", name: "Кристина", spec: "Ресницы" },
      { id: "master3", name: "Таня", spec: "Ресницы / Брови" },
      { id: "master4", name: "Анна", spec: "Стилист" },
      { id: "master5", name: "Елена", spec: "Маникюр" }
    ];

    let currentMasterId = null;
    let currentRequestForTimes = null;
    let proposedTimesArray = [];
    let currentTab = 'new';
    let flatpickrInstance = null;

    let requests = JSON.parse(localStorage.getItem('beauty_requests')) || [];

    function saveRequests() {
      localStorage.setItem('beauty_requests', JSON.stringify(requests));
    }

    function loadMasterSelect() {
      const select = document.getElementById('masterSelect');
      if (!select) return;
      
      select.innerHTML = MASTERS.map(m => `<option value="${m.id}">${m.name} (${m.spec})</option>`).join('');
      select.onchange = (e) => {
        currentMasterId = e.target.value;
        loadRequests();
      };
      currentMasterId = MASTERS[0].id;
      loadRequests();
    }

    function loadRequests() {
      const masterRequests = requests.filter(r => r.masterId === currentMasterId);
      filterAndDisplayRequests(masterRequests);
      updateTabCounters(masterRequests);
    }

    function filterAndDisplayRequests(masterRequests) {
      let filtered = [];
      switch(currentTab) {
        case 'new': filtered = masterRequests.filter(r => r.status === 'pending'); break;
        case 'waiting': filtered = masterRequests.filter(r => r.status === 'waiting_for_time'); break;
        case 'confirmed': filtered = masterRequests.filter(r => r.status === 'confirmed'); break;
        case 'completed': filtered = masterRequests.filter(r => r.status === 'completed'); break;
      }
      
      const container = document.getElementById('requestsContainer');
      if (!container) return;
      
      if (filtered.length === 0) {
        container.innerHTML = '<div style="background:white; border-radius:12px; padding:40px; text-align:center; color:#888;">Нет заявок</div>';
        return;
      }
      
      container.innerHTML = filtered.map(req => `
        <div class="request-card" data-id="${req.id}">
          <strong>${req.clientName}</strong>
          <div>${req.service}</div>
          <div>${new Date(req.createdAt).toLocaleString()}</div>
          ${req.confirmedTime ? `<div>Подтверждено: ${req.confirmedTime}</div>` : ''}
          ${req.masterRating ? `<div>Оценка клиента: ${req.masterRating}/5</div>` : ''}
          ${req.clientRating ? `<div>Ваша оценка: ${req.clientRating}/5</div>` : ''}
          <div style="margin-top: 15px;">${getActionButtons(req)}</div>
        </div>
      `).join('');
      
      filtered.forEach(req => {
        const card = document.querySelector(`.request-card[data-id="${req.id}"]`);
        if (card) {
          const proposeBtn = card.querySelector('.propose-time-btn');
          if (proposeBtn) proposeBtn.onclick = () => openTimePicker(req.id);
          const completeBtn = card.querySelector('.complete-btn');
          if (completeBtn) completeBtn.onclick = () => openClientRating(req.id);
        }
      });
    }

    function getActionButtons(req) {
      if (req.status === 'pending') return `<button class="propose-time-btn">Предложить время</button>`;
      if (req.status === 'confirmed') return `<button class="complete-btn">Завершить запись</button>`;
      if (req.status === 'completed' && !req.clientRating) return `<span style="color:#27ae60;">Ожидает оценки клиента</span>`;
      if (req.status === 'completed') return `<span style="color:#888;">Завершено</span>`;
      return '';
    }

    function updateTabCounters(requests) {
      const counts = {
        new: requests.filter(r => r.status === 'pending').length,
        waiting: requests.filter(r => r.status === 'waiting_for_time').length,
        confirmed: requests.filter(r => r.status === 'confirmed').length,
        completed: requests.filter(r => r.status === 'completed').length
      };
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const tab = btn.dataset.tab;
        const count = counts[tab];
        const existingBadge = btn.querySelector('.badge');
        if (count > 0) {
          if (existingBadge) existingBadge.textContent = count;
          else btn.innerHTML += `<span class="badge">${count}</span>`;
        } else if (existingBadge) existingBadge.remove();
      });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        loadRequests();
      };
    });

    function openTimePicker(requestId) {
      currentRequestForTimes = requestId;
      proposedTimesArray = [];
      document.getElementById('selectedTimesList').innerHTML = '';
      document.getElementById('timePickerModal').style.display = 'flex';
      
      setTimeout(() => {
        if (flatpickrInstance) flatpickrInstance.destroy();
        flatpickrInstance = flatpickr("#datetimePicker", {
          enableTime: true,
          dateFormat: "Y-m-d H:i",
          time_24hr: true,
          minuteIncrement: 15,
          locale: "ru"
        });
      }, 100);
    }

    document.getElementById('addTimeBtn').onclick = () => {
      const timePicker = document.getElementById('datetimePicker');
      if (!timePicker) return;
      const time = timePicker.value;
      if (!time) { alert('Выберите дату и время'); return; }
      if (proposedTimesArray.includes(time)) { alert('Это время уже добавлено'); return; }
      
      proposedTimesArray.push(time);
      const list = document.getElementById('selectedTimesList');
      list.innerHTML = proposedTimesArray.map(t => `
        <div class="time-card" style="display:flex; justify-content:space-between; align-items:center;">
          <span>${t}</span>
          <button onclick="removeTime('${t}')" style="margin:0; padding:5px 10px;">Удалить</button>
        </div>
      `).join('');
      timePicker.value = '';
    };

    window.removeTime = (time) => {
      proposedTimesArray = proposedTimesArray.filter(t => t !== time);
      const list = document.getElementById('selectedTimesList');
      list.innerHTML = proposedTimesArray.map(t => `
        <div class="time-card" style="display:flex; justify-content:space-between; align-items:center;">
          <span>${t}</span>
          <button onclick="removeTime('${t}')" style="margin:0; padding:5px 10px;">Удалить</button>
        </div>
      `).join('');
    };

    document.getElementById('sendTimesBtn').onclick = () => {
      if (proposedTimesArray.length === 0) { alert('Добавьте хотя бы одно время'); return; }
      
      const index = requests.findIndex(r => r.id === currentRequestForTimes);
      if (index !== -1) {
        requests[index].status = 'waiting_for_time';
        requests[index].proposedTimes = proposedTimesArray;
        saveRequests();
      }
      
      alert('Время отправлено клиенту');
      closeTimePickerModal();
      loadRequests();
    };

    window.closeTimePickerModal = () => {
      document.getElementById('timePickerModal').style.display = 'none';
      if (flatpickrInstance) { flatpickrInstance.destroy(); flatpickrInstance = null; }
    };

    let currentCompleteRequestId = null;

    window.openClientRating = (requestId) => {
      currentCompleteRequestId = requestId;
      document.getElementById('clientRatingModal').style.display = 'flex';
    };

    window.rateClient = (rating) => {
      const index = requests.findIndex(r => r.id === currentCompleteRequestId);
      if (index !== -1) {
        requests[index].status = 'completed';
        requests[index].clientRating = rating;
        requests[index].completedAt = new Date().toISOString();
        saveRequests();
      }
      alert(`Запись завершена! Оценка клиенту: ${rating}/5`);
      closeClientRatingModal();
      loadRequests();
    };

    window.closeClientRatingModal = () => {
      document.getElementById('clientRatingModal').style.display = 'none';
      currentCompleteRequestId = null;
    };

    // Запуск
    loadMasterSelect();

    // Анимация логотипа
    document.addEventListener('DOMContentLoaded', function() {
      const logoSvg = document.getElementById('logoSvg');
      const logoText = document.getElementById('logoText');
      let timeoutId = null;
      
      function showText() {
        logoSvg.classList.add('hide');
        setTimeout(() => {
          logoSvg.style.display = 'none';
          logoText.style.display = 'block';
          logoText.classList.remove('hide');
          timeoutId = setTimeout(showLogo, 6000);
        }, 300);
      }
      
      function showLogo() {
        logoText.classList.add('hide');
        setTimeout(() => {
          logoText.style.display = 'none';
          logoSvg.style.display = 'block';
          logoSvg.classList.remove('hide');
          logoSvg.classList.add('show');
          setTimeout(() => logoSvg.classList.remove('show'), 300);
          timeoutId = setTimeout(showText, 5000);
        }, 300);
      }
      
      timeoutId = setTimeout(showText, 5000);
    });
  </script>
</body>
</html>
